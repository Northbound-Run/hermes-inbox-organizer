name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: python -m pytest -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Build sdist + wheel
        run: |
          pip install build twine
          python -m build
          twine check --strict dist/*
      - name: Verify package-data ships in the wheel
        run: |
          unzip -l dist/*.whl | grep -q "hermes_inbox_organizer/plugin.yaml"
          unzip -l dist/*.whl | grep -q "hermes_inbox_organizer/py.typed"
          unzip -l dist/*.whl | grep -q "hermes_inbox_organizer/dashboard/dist/index.js"
